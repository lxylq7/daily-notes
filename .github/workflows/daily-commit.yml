name: Daily Commit

on:
  schedule:
    # 每天北京时间 16:00 (UTC 08:00) 运行
    - cron: "0 8 * * *"
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pick a daily sentence
        run: |
          SENTENCE=$(shuf -n 1 phrases.txt)
          echo "SENTENCE=$SENTENCE" >> $GITHUB_ENV
          echo "Picked: $SENTENCE"

      - name: Append to daily log
        run: |
          DATE=$(date +"%Y-%m-%d %A")
          echo "- **$DATE**  $SENTENCE" >> daily.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily.md
          git diff --staged --quiet || git commit -m "📝 daily: $SENTENCE"
          git push
